name: CI

permissions:
  contents: write

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

  e2e_raw_install:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo version
        run: |
          VERSION=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Download install script
        run: curl -fsSL -o /tmp/camptask-install.sh https://raw.githubusercontent.com/PerishCode/camptask/main/scripts/install.sh

      - name: Install from raw script
        run: bash /tmp/camptask-install.sh --version "${{ github.ref_name }}" --prefix /tmp/camptask-ci

      - name: Verify installed binary
        run: |
          /tmp/camptask-ci/bin/camptask > /tmp/camptask-ci/camptask.out
          grep -q "camptask ready" /tmp/camptask-ci/camptask.out

      - name: Download uninstall script
        run: curl -fsSL -o /tmp/camptask-uninstall.sh https://raw.githubusercontent.com/PerishCode/camptask/main/scripts/uninstall.sh

      - name: Uninstall from raw script
        run: bash /tmp/camptask-uninstall.sh --prefix /tmp/camptask-ci

      - name: Verify uninstall
        run: test ! -x /tmp/camptask-ci/bin/camptask

  release_resources:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo version
        run: |
          VERSION=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Build resources zip
        run: |
          cd resources
          zip -r ../resources.zip .

      - name: Upload resources to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: resources.zip
